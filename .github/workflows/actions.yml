name: Scrape SL Rainfall (Station CSVs)

on:
  workflow_dispatch:
  schedule:
    # every day at 00:30 UTC (06:00 in Sri Lanka, UTC+5:30)
    - cron: "30 0 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          # Optional overrides:
          # API_URL: https://...
          GROUP_COL: gauge
          OUT_DIR: out/Station_Rainfall_CSVs
        run: |
          python scrape_sl_rainfall.py

      - name: Upload zipped output
        uses: actions/upload-artifact@v4
        with:
          name: SL_Station_Rainfall_Data
          path: out/SL_Station_Rainfall_Data.zip
