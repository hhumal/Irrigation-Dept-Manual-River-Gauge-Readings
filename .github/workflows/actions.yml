name: Update Rainfall Data

on:
  # This schedule tells GitHub to run the script automatically
  # runs will actually happen locally at 5:30 AM, 11:30 AM, 5:30 PM, and 11:30 PM
  schedule:
    - cron: '0 */6 * * *'
  
  # This line allows you to trigger the script manually from the GitHub website
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    # REQUIRED: Grants the workflow permission to save/commit the CSV files back to the repository
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up the workflow by caching dependencies

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper Script
        run: python main.py

      - name: Commit and Push Updated CSVs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated update: Added latest rainfall readings"
          file_pattern: "Station_Rainfall_CSVs/*.csv"
